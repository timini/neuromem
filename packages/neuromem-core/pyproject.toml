# Package manifest for neuromem-core — the core library of the
# neuromem monorepo. Published to PyPI as `neuromem-core`. Import
# name: `neuromem`.
#
# Runtime dependencies are limited to the Python stdlib + numpy +
# pandas per Constitution v2.0.0 Principle II (Lean Dependency Set).
# Adding a new runtime dependency requires a constitutional
# amendment.

[project]
name = "neuromem-core"
version = "0.1.0"
description = "Neuroscience-inspired long-term memory for AI agents. Adapter-based, framework-agnostic, test-first."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [
    { name = "Tim Richardson" },
]
keywords = [
    "memory",
    "agents",
    "llm",
    "knowledge-graph",
    "neuroscience",
    "rag",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "numpy>=1.26",
    "pandas>=2.1",
]

[project.urls]
Homepage = "https://github.com/timini/neuromem"
Repository = "https://github.com/timini/neuromem"
Issues = "https://github.com/timini/neuromem/issues"
Documentation = "https://github.com/timini/neuromem/blob/main/packages/neuromem-core/README.md"
Specification = "https://github.com/timini/neuromem/blob/main/specs/001-neuromem-core/spec.md"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.6",
    "pre-commit>=3.0",
]

[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/neuromem"]

[tool.hatch.build.targets.sdist]
include = [
    "src/",
    "tests/",
    "README.md",
    "pyproject.toml",
]
