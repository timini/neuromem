# CI workflow for the neuromem monorepo.
#
# The `pre-commit` job is the primary enforcement point: it runs
# `pre-commit run --all-files`, which invokes EVERY hook defined
# in .pre-commit-config.yaml (currently ruff-format, ruff-check,
# and pytest — plus any hook added later). This makes the hook
# chain the single source of truth for local + CI: whatever gates
# a developer's commit locally, gates the PR on GitHub too.
#
# The `test` job is a matrix over supported Python versions
# (3.10-3.13) that runs pytest directly, catching version-specific
# issues that a single-version pre-commit run would miss.
#
# Constitution v2.0.0 Principle VI mandates pre-commit hooks run
# on every commit and that `--no-verify` is forbidden. This CI
# workflow is the server-side enforcement of that principle —
# once branch protection is enabled, nobody can merge a PR without
# passing the same gates the pre-commit hook enforces locally.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# Cancel older runs on the same ref when a new commit lands. Avoids
# wasting compute on stale PR iterations.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Default permissions — read-only token. No writes to the repo.
permissions:
  contents: read

jobs:
  # --------------------------------------------------------------
  # pre-commit: run EVERY hook in .pre-commit-config.yaml
  #
  # This is the primary CI gate. It runs:
  #   - ruff format (checks for drift)
  #   - ruff check  (lint)
  #   - pytest      (fast unit tests on Python 3.11)
  #
  # If a new hook is added to .pre-commit-config.yaml (mypy,
  # bandit, codespell, etc.), this job picks it up automatically
  # with zero changes to ci.yml.
  # --------------------------------------------------------------
  pre-commit:
    name: pre-commit (all hooks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --dev --locked

      # Cache the pre-commit hook environments. The cache key is
      # derived from the config file itself, so a config change
      # triggers a fresh cache.
      - name: Cache pre-commit hooks
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-

      - name: Run all pre-commit hooks
        run: uv run pre-commit run --all-files --show-diff-on-failure --color always

  # --------------------------------------------------------------
  # test: pytest matrix over Python 3.10-3.13
  #
  # The pre-commit job above already runs pytest once on Python
  # 3.11 via the hook. This matrix job runs pytest directly on
  # every supported Python version (per pyproject.toml classifiers)
  # to catch version-specific bugs. Python 3.11 is slightly
  # redundant with pre-commit but keeps the matrix visually
  # complete for reviewers.
  #
  # fail-fast is disabled so a regression on 3.13 doesn't mask a
  # different regression on 3.10.
  # --------------------------------------------------------------
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --dev

      - name: Show resolved dependency tree
        run: uv tree --package neuromem-core

      - name: Run pytest
        run: uv run --package neuromem-core pytest -v

  # --------------------------------------------------------------
  # ci-summary: synthetic aggregate job for branch protection.
  #
  # This job's only purpose is to be the single required check
  # you configure in GitHub branch protection rules. It depends
  # on every real job above. When you add or remove matrix
  # entries you don't need to reconfigure branch protection —
  # just this job's success remains the gate.
  # --------------------------------------------------------------
  ci-summary:
    name: CI summary
    runs-on: ubuntu-latest
    needs: [pre-commit, test]
    if: always()
    steps:
      - name: Fail if any upstream job failed
        run: |
          if [ "${{ needs.pre-commit.result }}" != "success" ] \
             || [ "${{ needs.test.result }}" != "success" ]; then
            echo "pre-commit=${{ needs.pre-commit.result }} test=${{ needs.test.result }}"
            exit 1
          fi
          echo "All CI jobs passed."
